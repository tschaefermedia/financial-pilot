services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - finanzpilot

  php:
    build:
      context: ./docker/php
    volumes:
      - .:/var/www/html
    networks:
      - finanzpilot

  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
    networks:
      - finanzpilot

networks:
  finanzpilot:
    driver: bridge
